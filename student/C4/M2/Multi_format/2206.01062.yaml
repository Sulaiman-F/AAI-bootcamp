    \ approaches and deep neural networks in recent years, document conversion remains\
    \ a challenging problem, as demonstrated by the numerous public competitions held\
    \ on this topic [1 \u2013 4]. The challenge originates from the huge variability\
    \ in PDF documents regarding layout, language and formats (scanned, programmatic\
    \ or a combination of both). Engineering a single ML model that can be applied\
