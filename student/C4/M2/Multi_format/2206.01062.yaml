  content_layer: body
  label: text
  orig: In addition to open intellectual property constraints for the source documents,
    we required that the documents in DocLayNet adhere to a few conditions. Firstly,
    we kept scanned documents to a minimum, since they introduce difficulties in annotation
    (see Section 4). As a second condition, we focussed on medium to large documents
    (> 10 pages) with technical content, dense in complex tables, figures, plots and
    captions. Such documents carry a lot of information value, but are often hard
    to analyse with high accuracy due to their challenging layouts. Counterexamples
    of documents not included in the dataset are receipts, invoices, hand-written
    documents or photographs showing "text in the wild".
