- children: []
  content_layer: body
  label: text
  orig: "Lately, new types of ML models for document-layout analysis have emerged\
    \ in the community [18 \u2013 21]. These models do not approach the problem of\
    \ layout analysis purely based on an image representation of the page, as computer\
    \ vision methods do. Instead, they combine the text tokens and image representation\
    \ of a page in order to obtain a segmentation. While the reported accuracies appear\
    \ to be promising, a broadly accepted data format which links geometric and textual\
    \ features has yet to establish."
  parent:
