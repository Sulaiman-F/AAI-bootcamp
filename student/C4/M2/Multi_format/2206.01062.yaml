- children: []
  content_layer: body
  label: text
  orig: The primary goal of DocLayNet is to obtain high-quality ML models capable
    of accurate document-layout analysis on a wide variety of challenging layouts.
    As discussed in Section 2, object detection models are currently the easiest to
    use, due to the standardisation of ground-truth data in COCO format [16] and the
    availability of general frameworks such as detectron2 [17]. Furthermore, baseline
    numbers in PubLayNet and DocBank were obtained using standard object detection
    models such as Mask R-CNN and Faster R-CNN. As such, we will relate to these object
    detection methods in this paper and leave the detailed evaluation of more recent
    methods mentioned in Section 2 for future work.
