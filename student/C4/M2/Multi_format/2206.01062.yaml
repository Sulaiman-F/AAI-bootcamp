  text: Dataset Comparison
- children: []
  content_layer: body
  label: text
  orig: "Throughout this paper, we claim that DocLayNet's wider variety of document\
    \ layouts leads to more robust layout detection models. In Table 5, we provide\
    \ evidence for that. We trained models on each of the available datasets (PubLayNet,\
    \ DocBank and DocLayNet) and evaluated them on the test sets of the other datasets.\
    \ Due to the different label sets and annotation styles, a direct comparison is\
    \ not possible. Hence, we focussed on the common labels among the datasets. Between\
    \ PubLayNet and DocLayNet, these are Picture , KDD '22, August 14\u201318, 2022,\
    \ Washington, DC, USA Birgit Pfitzmann, Christoph Auer, Michele Dolfi, Ahmed S.\
    \ Nassar, and Peter Staar Table 5: Prediction Performance (mAP@0.5-0.95) of a\
    \ Mask R-CNN R50 network across the PubLayNet, DocBank & DocLayNet data-sets.\
