    detection models from PubLayNet, which helped us estimate how many figures and
    tables a given page contains.
- children: []
  content_layer: body
  label: text
  orig: 'Phase 2: Label selection and guideline. We reviewed the collected documents
    and identified the most common structural features they exhibit. This was achieved
    by identifying recurrent layout elements and lead us to the definition of 11 distinct
    class labels. These 11 class labels are Caption , Footnote , Formula , List-item
    , Pagefooter, r, Page-header, r, Picture , Section-header, r, Table , Text, and
    Title . Critical factors that were considered for the choice of these class labels
    were (1) the overall occurrence of the label, (2) the specificity of the label,
    (3) recognisability on a single page (i.e. no need for context from previous or
    next page) and (4) overall coverage of the page. Specificity ensures that the
    choice of label is not ambiguous, while coverage ensures that all meaningful items
    on a page can be annotated. We refrained from class labels that are very specific
    to a document category, such as Abstract in the Scientific Articles category.
    We also avoided class labels that are tightly linked to the semantics of the text.
    Labels such as Author and Affiliation, as seen in DocBank, are often only distinguishable
    by discriminating on the textual content of an element, which goes beyond visual
    layout recognition, in particular outside the Scientific Articles category.'
  parent:
    $ref: '#/body'
