  self_ref: '#/texts/497'
  text: In this paper, we presented the DocLayNet dataset. It provides the document
    conversion and layout analysis research community a new and challenging dataset
    to improve and fine-tune novel ML methods on. In contrast to many other datasets,
    DocLayNet was created by human annotation in order to obtain reliable layout ground-truth
    on a wide variety of publication- and typesettingstyles. Including a large proportion
    of documents outside the scientific publishing domain adds significant value in
    this respect.
- children: []
  content_layer: body
  label: text
  orig: From the dataset, we have derived on the one hand reference metrics for human
    performance on document-layout annotation (through double and triple annotations)
    and on the other hand evaluated the baseline performance of commonly used object
    detection methods. We also illustrated the impact of various dataset-related aspects
    on model performance through data-ablation experiments, both from a size and class-label
    perspective. Last but not least, we compared the accuracy of models trained on
    other public datasets and showed that DocLayNet trained models are more robust.
